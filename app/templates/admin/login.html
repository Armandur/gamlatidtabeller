{% extends "admin/base.html" %}
{% block title %}Logga in - Admin{% endblock %}
{% block content %}
<h1>Logga in</h1>
{% if fel %}<p class="varning">{{ fel }}</p>{% endif %}
<form method="post" action="/logga-in" class="admin-kort">
  <input type="hidden" name="csrf" value="{{ csrf }}">
  <label for="losenord">Adminlösenord</label>
  <input type="password" id="losenord" name="losenord" autocomplete="current-password" autofocus>
  <p><button type="submit" class="knapp">Logga in</button></p>
</form>
{% endblock %}
